<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App (No API)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🌦️ Weather App</h1>

  <input type="text" id="city" placeholder="Enter city name">
  <button onclick="getWeather()">Search</button>

  <div id="weatherBox" class="hidden">
    <h2 id="cityName"></h2>
    <p id="temperature"></p>
    <p id="humidity"></p>
    <p id="description"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
